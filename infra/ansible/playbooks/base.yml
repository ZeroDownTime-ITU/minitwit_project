- name: Base setup for all nodes
  hosts: swarm,db,monitoring
  become: true

  tasks:
    - name: Update apt cache
      apt:
        update_cache: yes

    - name: Wait for apt lock to be released
      shell: while fuser /var/lib/dpkg/lock-frontend >/dev/null 2>&1; do sleep 5; done
      changed_when: false

    - name: Install Docker
      shell: curl -fsSL https://get.docker.com | sh
      args:
        creates: /usr/bin/docker
      retries: 3
      delay: 30
      register: result
      until: result.rc == 0

    - name: Start and enable Docker
      systemd:
        name: docker
        state: started
        enabled: yes

    - name: Install Docker Compose plugin
      apt:
        name: docker-compose-plugin
        state: present

    - name: Install node exporter
      unarchive:
        src: https://github.com/prometheus/node_exporter/releases/download/v1.8.1/node_exporter-1.8.1.linux-amd64.tar.gz
        dest: /usr/local/bin
        remote_src: yes
        extra_opts: [--strip-components=1]
        creates: /usr/local/bin/node_exporter

    - name: Create node exporter systemd service
      copy:
        dest: /etc/systemd/system/node_exporter.service
        content: |
          [Unit]
          Description=Node Exporter
          After=network.target

          [Service]
          ExecStart=/usr/local/bin/node_exporter
          Restart=on-failure

          [Install]
          WantedBy=multi-user.target

    - name: Start and enable node exporter
      systemd:
        name: node_exporter
        state: started
        enabled: yes
        daemon_reload: yes
    
    - name: Create alloy config directory
      file:
        path: /etc/alloy
        state: directory

    - name: Copy alloy config
      template:
        src: templates/alloy-config.alloy.j2
        dest: /etc/alloy/config.alloy

- name: Setup alloy on non-monitoring nodes
  hosts: swarm,db
  become: true

  tasks:
    - name: Run alloy container
      docker_container:
        name: alloy
        image: grafana/alloy:latest
        state: started
        restart_policy: always
        volumes:
          - /etc/alloy/config.alloy:/etc/alloy/config.alloy
          - /var/lib/docker/containers:/var/lib/docker/containers:ro
          - /var/run/docker.sock:/var/run/docker.sock