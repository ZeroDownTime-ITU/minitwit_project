- import_playbook: playbooks/base.yml  # install Docker, node exporter, and alloy on every node
- import_playbook: playbooks/swarm.yml  # initialize the Docker Swarm cluster across all swarm nodes
- import_playbook: playbooks/db.yml  # set up the persistent volume and start the PostgreSQL container
- import_playbook: playbooks/monitoring.yml  # deploy Prometheus, Grafana, and Loki on the monitoring node
- import_playbook: playbooks/deploy.yml  # copy configs and deploy the app stack via Docker Swarm
