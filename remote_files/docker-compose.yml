services:
  postgres-db:
    image: postgres:15-alpine
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - /mnt/volume_fra1_01/postgres_data:/var/lib/postgresql/data
    networks:
      - app-network

  java-backend:
    image: despotheanimal/minitwit-java:${VERSION:-latest}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7070/api/latest"]
      interval: 30s
      timeout: 5s
      retries: 3
    environment:
      - JDBC_URL=${JDBC_URL}
      - JDBC_USER=${POSTGRES_USER}
      - JDBC_PASS=${POSTGRES_PASSWORD}
      - JAVA_TOOL_OPTIONS=-Djdk.tracePinnedThreads=full
    depends_on:
      postgres-db:
        condition: service_healthy
    ports:
      - "7070:7070"
    networks:
      - app-network

  svelte-frontend:
    image: despotheanimal/minitwit-svelte:${VERSION:-latest}
    restart: always
    depends_on:
      java-backend:
        condition: service_started
    expose:
      - "80"
    networks:
      - app-network

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /mnt/volume_fra1_01/letsencrypt:/etc/letsencrypt:ro
      - /mnt/volume_fra1_01/certbot_www:/var/www/certbot
    # This command allows Nginx to start even if certs are missing, then reloads them every 6 hours once Certbot gets them.
    command: "/bin/sh -c 'while :; do sleep 6h & wait $${!}; nginx -s reload; done & nginx -g \"daemon off;\"'"
    depends_on:
      java-backend:
        condition: service_started
      svelte-frontend:
        condition: service_started
    networks:
      - app-network

  prometheus:
      image: prom/prometheus
      container_name: prometheus
      volumes:
        - ./prometheus.yml:/etc/prometheus/prometheus.yml
        - /mnt/volume_fra1_01/prometheus_data:/prometheus
      ports:
        - "9090:9090"
      networks:
        - app-network

  grafana:
    image: grafana/grafana
    container_name: grafana
    ports:
      - "3000:3000"
    volumes:
      - /mnt/volume_fra1_01/grafana_data:/var/lib/grafana
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards
    networks:
      - app-network


  certbot:
    image: certbot/certbot
    restart: always
    volumes:
      - /mnt/volume_fra1_01/letsencrypt:/etc/letsencrypt
      - /mnt/volume_fra1_01/certbot_www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done'"
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  grafana-storage: {}