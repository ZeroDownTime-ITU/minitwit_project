global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'minitwit-java'
    scrape_interval: 5s
    static_configs:
      - targets: ['java-backend:7070']
    metrics_path: '/metrics'

  - job_name: 'node'
    static_configs:
      - targets: ['172.17.0.1:9100']
        labels:
          instance: 'minitwit-prod'