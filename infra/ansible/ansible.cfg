[defaults]
inventory = inventory.digitalocean.yml  # use the DigitalOcean dynamic inventory plugin to discover hosts
vault_password_file = .vault_pass  # read the vault decryption password from this file to decrypt secrets.yml
host_key_checking = False  # skip SSH host key verification so new droplets don't require manual approval
# turn off annoying warnings
deprecation_warnings = False  # suppress deprecation warnings to keep ansible output readable
interpreter_python = auto_silent  # auto-detect the Python interpreter on remote hosts without printing a warning

[inventory]
enable_plugins = community.digitalocean.digitalocean, auto, yaml, ini  # load these inventory plugins in priority order so DigitalOcean is tried first
